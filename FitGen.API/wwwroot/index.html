<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitGen — Tu rutina personalizada</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e5e0;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    .header { margin-bottom: 32px; }
    .header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
    .header p  { font-size: 14px; color: #666; margin-top: 6px; line-height: 1.5; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
      background: #fff;
    }

    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }

    .unit { position: relative; }
    .unit input { padding-right: 44px; }
    .unit span {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #999;
      pointer-events: none;
    }

    .divider {
      height: 1px;
      background: #f0f0ea;
      margin: 24px 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button[type="submit"]:hover:not(:disabled) { background: #4f46e5; }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .toast.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    .toast.error {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>FitGen</h1>
    <p>Completá tu perfil y recibís una rutina personalizada directamente en tu correo.</p>
  </div>

  <form id="fitgen-form" novalidate>

    <!-- Nombre y Apellido -->
    <div class="row">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Juan" required />
      </div>
      <div class="form-group">
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" placeholder="Pérez" required />
      </div>
    </div>

    <!-- Edad sola -->
    <div class="form-group">
      <label for="edad">Edad</label>
      <div class="unit">
        <input type="number" id="edad" placeholder="25" min="10" max="100" required />
        <span>años</span>
      </div>
    </div>

    <!-- Días disponibles por semana solo -->
    <div class="form-group">
      <label for="diasDisponibles">Días disponibles por semana</label>
      <div class="unit">
        <input type="number" id="diasDisponibles" placeholder="3" min="1" max="7" required />
        <span>días</span>
      </div>
    </div>

    <!-- Peso actual y objetivo -->
    <div class="row">
      <div class="form-group">
        <label for="pesoActual">Peso actual</label>
        <div class="unit">
          <input type="number" id="pesoActual" placeholder="80" min="30" max="300" required />
          <span>kg</span>
        </div>
      </div>
      <div class="form-group">
        <label for="pesoObjetivo">Peso objetivo</label>
        <div class="unit">
          <input type="number" id="pesoObjetivo" placeholder="70" min="30" max="300" required />
          <span>kg</span>
        </div>
      </div>
    </div>

    <!-- Objetivo -->
    <div class="form-group">
      <label for="objetivo">Objetivo</label>
      <select id="objetivo" required>
        <option value="" disabled selected>Seleccioná</option>
        <option value="Bajar de peso">Bajar de peso</option>
        <option value="Ganar músculo">Ganar músculo</option>
        <option value="Ganar músculo y perder peso">Ganar músculo y perder peso</option>
        <option value="Mejorar resistencia">Mejorar resistencia</option>
        <option value="Mantenerme activo">Mantenerme activo</option>
      </select>
    </div>

    <div class="divider"></div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email donde recibís la rutina</label>
      <input type="email" id="email" placeholder="tu@gmail.com" required />
    </div>

    <button type="submit" id="submit-btn">
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">Generar mi rutina</span>
    </button>

    <div class="toast" id="toast"></div>

  </form>
</div>

<script>
  const form    = document.getElementById('fitgen-form');
  const btn     = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  const toast   = document.getElementById('toast');

  function setLoading(on) {
    btn.disabled          = on;
    spinner.style.display = on ? 'block' : 'none';
    btnText.textContent   = on ? 'Generando rutina...' : 'Generar mi rutina';
  }

  function showToast(type, msg) {
    toast.className     = 'toast ' + type;
    toast.textContent   = msg;
    toast.style.display = 'block';
  }

  function getFormData() {
    return {
      nombre:          document.getElementById('nombre').value.trim(),
      apellido:        document.getElementById('apellido').value.trim(),
      email:           document.getElementById('email').value.trim(),
      edad:            parseInt(document.getElementById('edad').value),
      objetivo:        document.getElementById('objetivo').value,
      diasDisponibles: parseInt(document.getElementById('diasDisponibles').value),
      pesoActual:      parseInt(document.getElementById('pesoActual').value),
      pesoObjetivo:    parseInt(document.getElementById('pesoObjetivo').value),
    };
  }

  function validate(data) {
    if (!data.nombre)                             return 'Completá tu nombre.';
    if (!data.apellido)                           return 'Completá tu apellido.';
    if (!data.edad || data.edad < 10)             return 'Ingresá una edad válida.';
    if (!data.pesoActual)                         return 'Ingresá tu peso actual.';
    if (!data.pesoObjetivo)                       return 'Ingresá tu peso objetivo.';
    if (!data.diasDisponibles)                    return 'Ingresá los días disponibles por semana.';
    if (!data.objetivo)                           return 'Seleccioná tu objetivo.';
    if (!data.email || !data.email.includes('@')) return 'Ingresá un email válido.';
    return null;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    toast.style.display = 'none';

    const data  = getFormData();
    const error = validate(data);

    if (error) {
      showToast('error', error);
      return;
    }

    setLoading(true);

    try {
      const response = await fetch('/api/rutinas/generar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.message || 'Ocurrió un error en el servidor.');
      }

      showToast('success', `¡Listo, ${data.nombre}! Tu rutina fue enviada a ${data.email}. Revisá tu bandeja de entrada.`);
      form.reset();

    } catch (err) {
      showToast('error', err.message || 'No se pudo conectar con el servidor. Intentá de nuevo.');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
